<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="240" height="240" rx="48" ry="48" fill="url(#bg)"/>

  <!-- Code brackets: < /> -->
  <text x="40" y="148" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="72" font-weight="700" fill="rgba(255,255,255,0.3)">&lt;/&gt;</text>

  <!-- Magnifying glass circle -->
  <circle cx="138" cy="110" r="44" fill="none" stroke="white" stroke-width="7" stroke-linecap="round"/>

  <!-- Magnifying glass handle -->
  <line x1="170" y1="142" x2="196" y2="168" stroke="white" stroke-width="7" stroke-linecap="round"/>

  <!-- Insight sparkle inside magnifying glass -->
  <circle cx="138" cy="100" r="4" fill="url(#accent)"/>
  <line x1="138" y1="88" x2="138" y2="112" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
  <line x1="126" y1="100" x2="150" y2="100" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
  <line x1="130" y1="92" x2="146" y2="108" stroke="url(#accent)" stroke-width="2" stroke-linecap="round"/>
  <line x1="146" y1="92" x2="130" y2="108" stroke="url(#accent)" stroke-width="2" stroke-linecap="round"/>
</svg>
